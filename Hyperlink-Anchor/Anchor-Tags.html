<!--
    @Information of All kind of HTML tags are mention in HTML-Strcture Folder

    Anchor Tag (Pair-Tag): <a></a> ; Default attribute: href="" (Hypertext REFerence)
    HTML Attribute -> Modifier of HTML Elements [Complete tag = Elements]
-->
    <a href="https://www.google.com">Search on Google</a>
    <!--If you already visited the link the color turns to purple from blue-->

    <br> <!--Line-Break Tag [Self-closing tag]-->

    <a href="https://www.google.com" target="_blank">Search on new tab</a>
    <!-- target="_blank" ; link opens in new tab -->

    <br>

    <a href="https://www.google.com" target="_self">Search on running tab</a>
    <!-- target="_self" ; link opens in running tab -->

    <br>

    <a href="SUV.png" download="Pajero_Sport.jpg">Download Image</a>
    <!-- In href="can use link" ; download="set file_name.exe" defines it's a downloadable link -->

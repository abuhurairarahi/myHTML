<!--
    HTML -> Instructions for computer
    HTML Syntax -> Rules for HTML Code (eg. grammer in English)
    HTML Attribute -> Modifier of HTML Elements [complete_tag = Elements] 

    Tags are two types: 1. Self-Closing Tag ; 2. Pair-Tag
    |-> Self-Closing Tag: There will be no closing tags.
    |-> Pair-Tag: These tags have opening & closing tags.

    #With examples, difference between HTML Tag & HTML Element

    HTML TAG:
    <h1> -> Opening HTML tag
    </h1> -> Closing HTML tag
    <img> -> Self Closing HTML tag

    HTML Element:
    <h1>This is a Heading</h1> -> A HTML Element.
-->

<!DOCTYPE html> <!-- self-closing tag -->
<html>
    <head>
        <!-- We place the non-visible(Hidden on website-body) commands here; Eg. title, mets-data etc. -->
        
        <!-- Title will be visible in the Tab -->
        <title>My Website</title> 

        <!-- Linking third-party fonts from "google-fonts" -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <!-- Can style the html-elements using <style>..</style> tags in head;
         @Optimal way to style the html file: linking an individual CSS file 
         
         We can connect CSS file using: <link> -> a self-closing tag\
         <link> has default attributes rel="" (means relation); href="" (Hyperlink Refernce)
        -->
        <link rel="stylesheet" href="style.css">
        
    </head>
    <body>
        <!-- All commands will be visible, when the html file will be loading over browser -->
        
        <h1 class="heading">Model 3</h1>
        <p class="sub-heading">Order Online for <span class="underline_text">Touchless Delivery</span></p>
        
        <!--
            <h1>..</h1>     : Heading-Tag (Pair-Tag & Block-Tag)
            <p>..</p>       : Paragraph-Tag (Pair-Tag & Block-Tag)
            <span>..</span> : In-line Section-Tag (Pair-Tag & Inline-Tag)
            class=".."      : Labeling Attribute  
        -->
    </body>

</html>
